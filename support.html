<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0F1419;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .hero {
            position: relative;
            margin-bottom: 48px;
        }

        .infinity {
            font-size: 96px;
            color: #B794F6;
            opacity: 0.12;
            line-height: 1;
            user-select: none;
        }

        .app-name {
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            margin-top: -20px;
            position: relative;
        }

        .tagline {
            font-size: 14px;
            color: #718096;
            margin-top: 8px;
        }

        .card {
            background-color: #1A202C;
            border: 1px solid #2D3748;
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        .card p {
            font-size: 14px;
            color: #A0AEC0;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .email-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #B794F6;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
            transition: opacity 0.2s;
        }

        .email-link:hover {
            opacity: 0.85;
        }

        .email-icon {
            font-size: 18px;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #4A5568;
        }

        .footer a {
            color: #718096;
            text-decoration: none;
        }

        .footer a:hover {
            color: #B794F6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="infinity">&infin;</div>
            <div class="app-name">Nebula</div>
            <div class="tagline">Your future, in focus.</div>
        </div>

        <div class="card">
            <h2>Need help?</h2>
            <p>We're here to assist with any questions, feedback, or issues you may have with Nebula.</p>
            <a href="mailto:nebulataskweaver@gmail.com" class="email-link">
                <span class="email-icon">&#9993;</span>
                Contact Support
            </a>
        </div>

        <div class="footer">
            <a href="./index.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
